<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Időpont: ' + ${appointment.title}">Időpont részletei</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root {
            --navy:#0f1f3d;--navy-soft:#1a2f52;--teal:#00a896;--teal-light:#02c9b3;--teal-dim:rgba(0,168,150,.12);
            --amber:#f4a035;--red:#e84545;--green:#2ecc71;
            --bg:#f0f3f8;--surface:#fff;--surface-2:#f7f9fc;--border:#e2e8f0;
            --text-primary:#0f1f3d;--text-muted:#64748b;
            --shadow-sm:0 1px 4px rgba(15,31,61,.06);--shadow-md:0 4px 16px rgba(15,31,61,.10);
            --r-sm:6px;--r-md:10px;--r-lg:16px;--t:.25s cubic-bezier(.4,0,.2,1);
        }
        *,*::before,*::after{box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);}
        .navbar-custom{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);padding:.75rem 0;}
        .navbar-custom .navbar-brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy)!important;font-size:1.15rem;}
        .navbar-custom .navbar-brand i{color:var(--teal);}
        .btn-sm-nav{padding:.35rem .8rem;font-size:.82rem;border-radius:var(--r-sm);border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;text-decoration:none;transition:var(--t);}
        .btn-sm-nav:hover{background:var(--surface-2);color:var(--navy);border-color:var(--border);}
        .hero-section{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-soft) 60%,#1e3a6e 100%);color:white;padding:2rem 2rem;margin-bottom:2.5rem;border-radius:var(--r-lg);position:relative;overflow:hidden;}
        .hero-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(0,168,150,.18) 0%,transparent 60%);pointer-events:none;}
        .hero-section h1{font-family:'Playfair Display',serif;font-weight:700;font-size:1.7rem;margin:0;}
        .feature-icon-sm{width:48px;height:48px;background:rgba(0,168,150,.2);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:#02c9b3;font-size:1.2rem;}
        .breadcrumb{font-size:.8rem;}
        .breadcrumb-item+.breadcrumb-item::before{color:rgba(255,255,255,.5);}
        .breadcrumb-item a{color:rgba(255,255,255,.75);text-decoration:none;}
        .breadcrumb-item.active{color:rgba(255,255,255,.95);}
        .btn-outline-light-sm{border:1px solid rgba(255,255,255,.5);color:white;padding:.35rem .9rem;font-size:.82rem;border-radius:var(--r-sm);background:transparent;font-family:'DM Sans',sans-serif;text-decoration:none;transition:var(--t);}
        .btn-outline-light-sm:hover{background:rgba(255,255,255,.15);color:white;}
        .card-custom{border:1px solid var(--border)!important;border-radius:var(--r-lg)!important;box-shadow:var(--shadow-sm);background:var(--surface);margin-bottom:1.5rem;animation:fadeUp .45s ease-out both;}
        .card-custom:nth-child(2){animation-delay:.1s;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
        .appt-border-pending{border-left:5px solid var(--amber)!important;}
        .appt-border-confirmed{border-left:5px solid var(--green)!important;}
        .appt-border-cancelled{border-left:5px solid var(--red)!important;}
        .appt-border-completed{border-left:5px solid var(--border)!important;}
        .status-badge{display:inline-block;padding:.35rem 1rem;border-radius:20px;font-size:.78rem;font-weight:600;letter-spacing:.03em;}
        .status-pending{background:#fef9ee;color:#9a6700;border:1px solid var(--amber);}
        .status-confirmed{background:#e8faf5;color:#1a6b45;border:1px solid var(--green);}
        .status-cancelled{background:#fef0f0;color:#8b1a1a;border:1px solid var(--red);}
        .status-completed{background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border);}
        .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin-bottom:1.5rem;}
        .detail-item{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem 1.2rem;}
        .detail-item-icon{width:34px;height:34px;background:var(--teal-dim);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:.85rem;margin-bottom:.7rem;}
        .detail-item label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:.3rem;display:block;}
        .detail-item span{font-weight:700;color:var(--text-primary);font-size:.95rem;}
        .timeline-item{display:flex;align-items:flex-start;gap:1rem;padding:.85rem 0;border-bottom:1px solid var(--border);}
        .timeline-item:last-child{border-bottom:none;}
        .timeline-icon{width:30px;height:30px;border-radius:50%;background:var(--teal-dim);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:.75rem;flex-shrink:0;}
        .btn{font-family:'DM Sans',sans-serif;font-weight:500;border-radius:var(--r-sm);transition:var(--t);}
        .btn-danger{background:var(--red);border-color:var(--red);color:white;}
        .btn-danger:hover{background:#c0392b;border-color:#c0392b;transform:translateY(-1px);}
        .btn-outline-secondary{border-color:var(--border);color:var(--text-muted);}
        .btn-outline-secondary:hover{background:var(--surface-2);color:var(--navy);}
        .btn-outline-primary{border-color:var(--teal);color:var(--teal);}
        .btn-outline-primary:hover{background:var(--teal);color:white;}
        .btn-sm{padding:.35rem .8rem;font-size:.82rem;}
        .alert{border-radius:var(--r-md);border:0;border-left:4px solid;padding:.9rem 1.1rem;font-size:.9rem;}
        .alert-success{background:#e8faf5;border-color:var(--green);color:#1a6b45;}
        .alert-error,.alert-danger{background:#fef0f0;border-color:var(--red);color:#8b1a1a;}
        footer{border-top:1px solid var(--border);margin-top:3rem;padding:1.5rem 0;}
    </style>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<div class="container py-4" style="max-width:860px;">
    <!-- Hero -->
    <div class="hero-section">
        <div class="d-flex justify-content-between align-items-center position-relative">
            <div class="d-flex align-items-center gap-3">
                <div class="feature-icon-sm"><i class="fas fa-clipboard-list"></i></div>
                <div>
                    <h1>Időpont Részletei</h1>
                    <nav aria-label="breadcrumb" class="mt-1">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="/user/appointments">Időpontjaim</a></li>
                            <li class="breadcrumb-item active">Részletek</li>
                        </ol>
                    </nav>
                </div>
            </div>
            <a href="/user/appointments" class="btn-outline-light-sm">
                <i class="fas fa-arrow-left me-1"></i>Vissza
            </a>
        </div>
    </div>

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success mb-3">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error mb-3">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
    </div>

    <!-- Main appointment card -->
    <div class="card-custom"
         th:classappend="${appointment.status.toString() == 'PENDING'} ? 'appt-border-pending' :
                        (${appointment.status.toString() == 'CONFIRMED'} ? 'appt-border-confirmed' :
                        (${appointment.status.toString() == 'CANCELLED'} ? 'appt-border-cancelled' : 'appt-border-completed'))">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
                <h2 class="fw-bold mb-0" style="font-family:'Playfair Display',serif;font-size:1.5rem;" th:text="${appointment.title}">Időpont</h2>
                <span class="status-badge"
                      th:classappend="${appointment.status.cssClass}"
                      th:text="${appointment.status.displayName}">ÁLLAPOT</span>
            </div>

            <div class="detail-grid">
                <div class="detail-item">
                    <div class="detail-item-icon"><i class="fas fa-calendar"></i></div>
                    <label>Dátum</label>
                    <span th:text="${#temporals.format(appointment.appointmentDate, 'yyyy. MMMM dd.')}">2024. január 15.</span>
                </div>
                <div class="detail-item">
                    <div class="detail-item-icon"><i class="far fa-clock"></i></div>
                    <label>Kezdés</label>
                    <span th:text="${#temporals.format(appointment.appointmentDate, 'HH:mm')}">10:00</span>
                </div>
                <div class="detail-item">
                    <div class="detail-item-icon"><i class="fas fa-flag-checkered"></i></div>
                    <label>Befejezés</label>
                    <span th:text="${#temporals.format(appointment.endTime, 'HH:mm')}">11:00</span>
                </div>
                <div class="detail-item">
                    <div class="detail-item-icon"><i class="fas fa-hourglass-half"></i></div>
                    <label>Időtartam</label>
                    <span th:text="${appointment.durationMinutes + ' perc'}">60 perc</span>
                </div>
            </div>

            <div th:if="${appointment.description}" class="p-3 rounded mb-4" style="background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--teal);">
                <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:.5rem;">Leírás</div>
                <p class="mb-0" style="line-height:1.7;" th:text="${appointment.description}"></p>
            </div>

            <div class="d-flex flex-wrap gap-2 pt-3" style="border-top:1px solid var(--border);">
                <a href="/user/appointments" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left me-1"></i>Vissza a listához
                </a>
                <a th:if="${appointment.status.active}"
                   th:href="@{/user/appointment/{id}/edit(id=${appointment.id})}"
                   class="btn btn-outline-primary btn-sm">
                    <i class="fas fa-edit me-1"></i>Szerkesztés
                </a>
                <form th:if="${appointment.status.active}"
                      th:action="@{/user/appointment/{id}/cancel(id=${appointment.id})}"
                      method="post" class="d-inline">
                    <button type="submit" class="btn btn-danger btn-sm"
                            onclick="return confirm('Biztosan lemondod ezt az időpontot?')">
                        <i class="fas fa-times me-1"></i>Lemondás
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Timeline -->
    <div class="card-custom">
        <div class="card-body p-4">
            <h6 class="fw-bold mb-3"><i class="fas fa-history me-2" style="color:var(--teal);"></i>Időpont története</h6>

            <div class="timeline-item">
                <div class="timeline-icon"><i class="fas fa-plus"></i></div>
                <div>
                    <div class="fw-bold" style="font-size:.88rem;">Létrehozva</div>
                    <div class="text-muted" style="font-size:.8rem;" th:text="${#temporals.format(appointment.createdAt, 'yyyy. MM. dd. HH:mm')}">2024. 01. 10. 14:30</div>
                </div>
            </div>

            <div th:if="${appointment.updatedAt}" class="timeline-item">
                <div class="timeline-icon"><i class="fas fa-edit"></i></div>
                <div>
                    <div class="fw-bold" style="font-size:.88rem;">Utoljára módosítva</div>
                    <div class="text-muted" style="font-size:.8rem;" th:text="${#temporals.format(appointment.updatedAt, 'yyyy. MM. dd. HH:mm')}">2024. 01. 12. 09:15</div>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-icon"><i class="fas fa-info"></i></div>
                <div>
                    <div class="fw-bold mb-1" style="font-size:.88rem;">Jelenlegi állapot</div>
                    <span class="status-badge" th:classappend="${appointment.status.cssClass}" th:text="${appointment.status.displayName}"></span>
                </div>
            </div>

            <div th:if="${appointment.appointmentDate.isAfter(T(java.time.LocalDateTime).now())}" class="timeline-item">
                <div class="timeline-icon"><i class="fas fa-hourglass"></i></div>
                <div>
                    <div class="fw-bold" style="font-size:.88rem;">Esedékesség</div>
                    <div class="text-muted" style="font-size:.8rem;" th:text="${#temporals.format(appointment.appointmentDate, 'yyyy. MM. dd. HH:mm')}">2024. 01. 15. 10:00</div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
