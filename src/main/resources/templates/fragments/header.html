<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Időpontfoglaló</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<header th:fragment="header">
    <div class="container">
        <div class="header-content">
            <h1>
                <i class="fas fa-calendar-check"></i> Időpontfoglaló
            </h1>

            <nav>
                <!-- Admin Links -->
                <div sec:authorize="hasRole('ADMIN')" style="display:inline;">
                    <a th:href="@{/admin/dashboard}">
                        <i class="fas fa-gauge-high"></i> Dashboard
                    </a>
                    <a th:href="@{/admin/users}">
                        <i class="fas fa-users"></i> Felhasználók
                    </a>
                    <a th:href="@{/admin/appointments}">
                        <i class="fas fa-calendar-alt"></i> Időpontok
                    </a>
                    <a th:href="@{/admin/departments}">
                        <i class="fas fa-building"></i> Részlegek
                    </a>
                </div>

                <!-- Department Admin Links -->
                <div sec:authorize="hasRole('DEPARTMENT_ADMIN')" style="display:inline;">
                    <a th:href="@{/department-admin/dashboard}">
                        <i class="fas fa-gauge-high"></i> Dashboard
                    </a>
                </div>

                <!-- User Links -->
                <div sec:authorize="hasRole('USER')" style="display:inline;">
                    <a th:href="@{/appointments/my-appointments}">
                        <i class="fas fa-calendar-check"></i> Időpontjaim
                    </a>
                    <a th:href="@{/appointments}">
                        <i class="fas fa-building"></i> Részlegek
                    </a>
                </div>

                <!-- Common Links -->
                <a sec:authorize="isAuthenticated()" th:href="@{/profile}">
                    <i class="fas fa-user"></i> Profilom
                </a>
                <a th:href="@{/logout}" class="logout-link">
                    <i class="fas fa-sign-out-alt"></i> Kijelentkezés
                </a>
            </nav>
        </div>
    </div>
</header>

</body>
</html>
