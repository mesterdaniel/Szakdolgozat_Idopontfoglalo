<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Regisztráció – Időpontfoglaló</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0f1f3d; --navy-soft: #1a2f52; --teal: #00a896; --teal-light: #02c9b3;
            --teal-dim: rgba(0,168,150,.12); --red: #e84545; --green: #2ecc71;
            --bg: #f0f3f8; --surface: #ffffff; --surface-2: #f7f9fc;
            --border: #e2e8f0; --text-primary: #0f1f3d; --text-muted: #64748b; --text-light: #94a3b8;
            --shadow-sm: 0 1px 4px rgba(15,31,61,.06); --shadow-md: 0 4px 16px rgba(15,31,61,.10);
            --shadow-lg: 0 8px 32px rgba(15,31,61,.14); --r-sm: 6px; --r-xl: 24px; --t: .25s cubic-bezier(.4,0,.2,1);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; margin: 0; transition: background var(--t), color var(--t); }
        .hero-section {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-soft) 60%, #1e3a6e 100%);
            color: white; padding: 4rem 0; margin-bottom: 3rem; position: relative; overflow: hidden;
        }
        .hero-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 50%, rgba(0,168,150,.2) 0%, transparent 65%); }
        .hero-section::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 36px; background: var(--bg); clip-path: ellipse(55% 100% at 50% 100%); transition: background var(--t); }
        .hero-section h1 { font-family: 'Playfair Display', serif; font-weight: 700; }
        .hero-logo { font-size: 2.5rem; margin-bottom: .75rem; color: var(--teal-light); }
        .auth-card { background: var(--surface); border: 1px solid var(--border) !important; border-radius: var(--r-xl) !important; box-shadow: var(--shadow-lg); max-width: 560px; margin: 0 auto; transition: var(--t); }
        .auth-card:hover { transform: translateY(-4px); }
        .auth-card .card-body { padding: 2.5rem; }
        .title-decoration { position: relative; padding-bottom: 14px; margin-bottom: 1.75rem; font-family: 'Playfair Display', serif; }
        .title-decoration::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: var(--teal); border-radius: 2px; }
        .form-label { font-weight: 500; color: var(--text-primary); font-size: .9rem; margin-bottom: .4rem; }
        .form-control { background: var(--surface-2); border: 1.5px solid var(--border); border-radius: var(--r-sm); color: var(--text-primary); padding: .65rem 1rem; transition: var(--t); }
        .form-control:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,168,150,.15); background: var(--surface); color: var(--text-primary); }
        .btn-primary { background: var(--teal); border: none; font-weight: 600; padding: .75rem 2rem; border-radius: var(--r-sm); transition: var(--t); }
        .btn-primary:hover { background: var(--teal-light); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,168,150,.3); }
        .alert { border-radius: 10px; border: 0; border-left: 4px solid; padding: .9rem 1.1rem; font-size: .9rem; }
        .alert-success { background: #e8faf5; border-color: var(--green); color: #1a6b45; }
        .alert-danger  { background: #fef0f0; border-color: var(--red); color: #8b1a1a; }
        .text-muted { color: var(--text-muted) !important; }
        .form-text { color: var(--text-light); font-size: .8rem; }
        a { color: var(--teal); text-decoration: none; } a:hover { color: var(--teal-light); }
        footer { background: var(--surface) !important; border-top: 1px solid var(--border); padding: 1.5rem 0; color: var(--text-muted); font-size: .88rem; }
    </style>
</head>
<body>
<div class="hero-section">
    <div class="container text-center position-relative">
        <div class="hero-logo"><i class="fas fa-calendar-check"></i></div>
        <h1 class="display-4 fw-bold mb-2">Időpontfoglaló</h1>
        <p class="lead mb-0" style="opacity:.8;font-weight:300;">Hozzon létre fiókot az időpontfoglaláshoz</p>
    </div>
</div>

<div class="container">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4">
        <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card auth-card">
                <div class="card-body">
                    <h2 class="text-center title-decoration">Regisztráció</h2>
                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">Felhasználónév</label>
                            <input type="text" class="form-control" name="username" id="username" placeholder="Felhasználónév" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email cím</label>
                            <input type="email" class="form-control" name="email" id="email" placeholder="pelda@email.com" required>
                            <div class="form-text">Erre küldjük az értesítéseket.</div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="firstName" class="form-label">Vezetéknév <span style="color:var(--text-light);font-weight:400;">(opcionális)</span></label>
                                <input type="text" class="form-control" name="firstName" id="firstName" placeholder="Vezetéknév">
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label">Keresztnév <span style="color:var(--text-light);font-weight:400;">(opcionális)</span></label>
                                <input type="text" class="form-control" name="lastName" id="lastName" placeholder="Keresztnév">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Jelszó</label>
                            <input type="password" class="form-control" name="password" id="password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-user-plus me-2"></i>Regisztráció
                            </button>
                        </div>
                    </form>
                    <p class="text-center text-muted mt-4 mb-0" style="font-size:.9rem;">
                        Már van fiókja? <a th:href="@{/login}">Jelentkezzen be!</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5">
    <div class="container text-center">
        <p class="mb-0"><i class="fas fa-calendar-check me-2" style="color:var(--teal)"></i>Időpontfoglaló Rendszer &copy; 2025</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
