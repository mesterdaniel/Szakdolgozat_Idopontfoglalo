<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Részlegek Kezelése | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root{--navy:#0f1f3d;--navy-soft:#1a2f52;--teal:#00a896;--teal-light:#02c9b3;--teal-dim:rgba(0,168,150,.12);--amber:#f4a035;--red:#e84545;--green:#2ecc71;--bg:#f0f3f8;--surface:#fff;--surface-2:#f7f9fc;--border:#e2e8f0;--text-primary:#0f1f3d;--text-muted:#64748b;--shadow-sm:0 1px 4px rgba(15,31,61,.06);--shadow-md:0 4px 16px rgba(15,31,61,.10);--r-sm:6px;--r-lg:16px;--t:.25s cubic-bezier(.4,0,.2,1);}
        *,*::before,*::after{box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);}
        .navbar-custom{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);padding:.75rem 0;}
        .navbar-custom .navbar-brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy)!important;}
        .navbar-custom .navbar-brand i{color:var(--teal);}
        .navbar-custom .nav-link{color:var(--text-muted)!important;font-weight:500;padding:.4rem .9rem!important;border-radius:var(--r-sm);transition:var(--t);}
        .navbar-custom .nav-link:hover{color:var(--navy)!important;background:var(--teal-dim);}
        .hero-section{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-soft) 60%,#1e3a6e 100%);color:white;padding:2rem 1.5rem;margin-bottom:2.5rem;border-radius:var(--r-lg);position:relative;overflow:hidden;}
        .hero-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(0,168,150,.18) 0%,transparent 60%);pointer-events:none;}
        .hero-section h1{font-family:'Playfair Display',serif;font-weight:700;font-size:1.7rem;margin:0;}

        .department-card{background:var(--surface);border:1px solid var(--border)!important;border-radius:var(--r-lg)!important;box-shadow:var(--shadow-sm);transition:transform var(--t),box-shadow var(--t);border-left:4px solid !important;}
        .department-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
        .active-department{border-left-color:var(--green)!important;}
        .inactive-department{border-left-color:var(--red)!important;}
        .card-body{padding:1.4rem;}

        .btn{font-family:'DM Sans',sans-serif;font-weight:500;border-radius:var(--r-sm);transition:var(--t);}
        .btn-primary{background:var(--teal);border-color:var(--teal);color:white;}
        .btn-primary:hover{background:var(--teal-light);border-color:var(--teal-light);transform:translateY(-1px);color:white;}
        .btn-outline-primary{border-color:var(--teal);color:var(--teal);}
        .btn-outline-primary:hover{background:var(--teal);color:white;}
        .btn-outline-secondary{border-color:var(--border);color:var(--text-muted);}
        .btn-outline-secondary:hover{background:var(--surface-2);color:var(--navy);}
        .btn-warning{background:var(--amber);border-color:var(--amber);color:white;}
        .btn-warning:hover{background:#e9962d;transform:translateY(-1px);color:white;}
        .btn-success{background:var(--green);border-color:var(--green);color:white;}
        .btn-success:hover{background:#27ae60;transform:translateY(-1px);color:white;}
        .btn-outline-light{border-color:rgba(255,255,255,.5);color:white;}
        .btn-outline-light:hover{background:rgba(255,255,255,.15);color:white;}
        .btn-sm{padding:.35rem .8rem;font-size:.82rem;}

        .alert{border-radius:10px;border:0;border-left:4px solid;padding:.9rem 1.1rem;font-size:.9rem;}
        .alert-success{background:#e8faf5;border-color:var(--green);color:#1a6b45;}
        .alert-danger{background:#fef0f0;border-color:var(--red);color:#8b1a1a;}

        .badge.bg-success{background:var(--green)!important;}
        .badge.bg-secondary{background:var(--text-muted)!important;}
        .badge-admin{background:#1a3faa!important;font-size:.75rem;}
        .dept-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin:0;}
        .dept-desc{font-size:.88rem;color:var(--text-muted);margin:.4rem 0 .75rem;}
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container-fluid px-4 py-4">
    <div class="hero-section mb-4">
        <div class="d-flex justify-content-between align-items-center position-relative">
            <div>
                <h1><i class="fas fa-building me-2" style="color:var(--teal-light);font-size:1.3rem;"></i>Részlegek Kezelése</h1>
                <p class="mb-0 opacity-75" style="font-size:.9rem;">Szervezeti egységek és adminisztrátorok</p>
            </div>
            <div class="d-flex gap-2">
                <a href="/admin/departments/new" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>Új Részleg</a>
                <a href="/admin/dashboard" class="btn btn-outline-light btn-sm"><i class="fas fa-arrow-left me-1"></i>Vissza</a>
            </div>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success mb-3" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

    <div class="row g-4">
        <div th:each="department : ${departments}" class="col-md-6 col-lg-4">
            <div class="card department-card" th:classappend="${department.active} ? 'active-department' : 'inactive-department'">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h3 class="dept-title" th:text="${department.name}"></h3>
                        <span class="badge" th:classappend="${department.active} ? 'bg-success' : 'bg-secondary'" th:text="${department.active} ? 'Aktív' : 'Inaktív'" style="font-size:.72rem;"></span>
                    </div>
                    <p class="dept-desc" th:text="${department.description} ?: 'Nincs leírás'"></p>

                    <div class="mb-3">
                        <span style="font-size:.8rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Adminok</span>
                        <div class="mt-1">
                            <span th:if="${department.departmentAdmins.empty}" style="font-size:.85rem;color:var(--text-light);">Nincs admin</span>
                            <span th:each="admin : ${department.departmentAdmins}" class="badge badge-admin me-1" th:text="${admin.username}"></span>
                        </div>
                    </div>

                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/admin/departments/{id}(id=${department.id})}" class="btn btn-sm btn-outline-primary">Részletek</a>
                        <a th:href="@{/admin/departments/{id}/edit(id=${department.id})}" class="btn btn-sm btn-outline-secondary">Szerkesztés</a>
                        <form th:action="@{/admin/departments/{id}/toggle-status(id=${department.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm" th:classappend="${department.active} ? 'btn-warning' : 'btn-success'" th:text="${department.active} ? 'Inaktiválás' : 'Aktiválás'"></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
