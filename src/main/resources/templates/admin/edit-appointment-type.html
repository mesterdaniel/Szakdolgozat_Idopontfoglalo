<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${appointmentType.name} + ' szerkesztése | Admin'">Időpont típus szerkesztése</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        :root{--navy:#0f1f3d;--navy-soft:#1a2f52;--teal:#00a896;--teal-light:#02c9b3;--teal-dim:rgba(0,168,150,.12);--red:#e84545;--bg:#f0f3f8;--surface:#fff;--surface-2:#f7f9fc;--border:#e2e8f0;--text-primary:#0f1f3d;--text-muted:#64748b;--text-light:#94a3b8;--shadow-sm:0 1px 4px rgba(15,31,61,.06);--shadow-md:0 4px 16px rgba(15,31,61,.10);--r-sm:6px;--r-lg:16px;--r-xl:24px;--t:.25s cubic-bezier(.4,0,.2,1);}
        *,*::before,*::after{box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);}
        .navbar-custom{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);padding:.75rem 0;}
        .navbar-custom .navbar-brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy)!important;}
        .navbar-custom .navbar-brand i{color:var(--teal);}
        .navbar-custom .nav-link{color:var(--text-muted)!important;font-weight:500;padding:.4rem .9rem!important;border-radius:var(--r-sm);transition:var(--t);}
        .navbar-custom .nav-link:hover{color:var(--navy)!important;background:var(--teal-dim);}
        .page-header{padding:2.5rem 0 1.5rem;}
        .page-header h1{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy);}
        .card{background:var(--surface);border:1px solid var(--border)!important;border-radius:var(--r-xl)!important;box-shadow:var(--shadow-md);}
        .card-header{background:var(--surface-2)!important;border-bottom:1px solid var(--border)!important;border-radius:var(--r-xl) var(--r-xl) 0 0!important;padding:1.1rem 1.5rem;font-weight:600;color:var(--navy);}
        .card-body{padding:2rem;}
        .form-label{font-weight:500;color:var(--text-primary);font-size:.9rem;margin-bottom:.4rem;}
        .form-control,.form-select{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text-primary);padding:.65rem 1rem;transition:var(--t);}
        .form-control:focus,.form-select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,168,150,.15);background:var(--surface);}
        textarea.form-control{resize:vertical;min-height:90px;}
        .form-text{color:var(--text-light);font-size:.8rem;}
        .form-check-input:checked{background-color:var(--teal);border-color:var(--teal);}
        .section-divider{border-color:var(--border);margin:1.5rem 0;}
        .section-title{font-weight:600;color:var(--text-muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;}

        .btn{font-family:'DM Sans',sans-serif;font-weight:500;border-radius:var(--r-sm);transition:var(--t);}
        .btn-primary{background:var(--teal);border-color:var(--teal);color:white;}
        .btn-primary:hover{background:var(--teal-light);transform:translateY(-1px);color:white;}
        .btn-danger{background:var(--red);border-color:var(--red);color:white;}
        .btn-danger:hover{background:#c0392b;transform:translateY(-1px);color:white;}
        .btn-outline-secondary{border-color:var(--border);color:var(--text-muted);}
        .btn-outline-secondary:hover{background:var(--surface-2);color:var(--navy);}
        .alert{border-radius:10px;border:0;border-left:4px solid;padding:.9rem 1.1rem;font-size:.9rem;}
        .alert-success{background:#e8faf5;border-color:#2ecc71;color:#1a6b45;}
        .alert-danger{background:#fef0f0;border-color:var(--red);color:#8b1a1a;}
        .action-bar{display:flex;gap:.75rem;border-top:1px solid var(--border);padding-top:1.5rem;margin-top:1rem;}
        .danger-zone{background:#fff5f5;border:1px solid #fcc;border-radius:var(--r-lg);padding:1.25rem;margin-top:1rem;}
        .danger-zone h6{color:var(--red);font-weight:600;margin-bottom:.5rem;font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;}
        .danger-zone p{color:var(--text-muted);font-size:.85rem;margin-bottom:.75rem;}
    </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="mb-1" th:text="'Típus: ' + ${appointmentType.name}"></h1>
            <p class="text-muted mb-0" style="font-size:.9rem;" th:text="'Részleg: ' + ${department.name}"></p>
        </div>
        <a th:href="@{/admin/departments/{id}(id=${department.id})}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Vissza</a>
    </div>

    <div th:if="${success}" class="alert alert-success mb-3"><i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-danger mb-3"><i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span></div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card mb-4">
                <div class="card-header"><i class="fas fa-calendar-edit me-2" style="color:var(--teal)"></i>Típus adatai</div>
                <div class="card-body">
                    <form th:action="@{/admin/departments/{departmentId}/update-appointment-type/{typeId}(departmentId=${department.id}, typeId=${appointmentType.id})}" method="post">

                        <div class="section-title">Alapinformációk</div>
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="name" class="form-label">Név</label>
                                <input type="text" class="form-control" id="name" name="name" th:value="${appointmentType.name}" required>
                                <div class="form-text">Az időpont típus neve</div>
                            </div>
                            <div class="col-md-6">
                                <label for="defaultDurationMinutes" class="form-label">Időtartam (perc)</label>
                                <input type="number" class="form-control" id="defaultDurationMinutes" name="defaultDurationMinutes" th:value="${appointmentType.defaultDurationMinutes}" min="5" max="240" required>
                                <div class="form-text">5–240 perc között</div>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="maxParticipants" class="form-label">Maximális résztvevők</label>
                                <input type="number" class="form-control" id="maxParticipants" name="maxParticipants" th:value="${appointmentType.maxParticipants}" min="1" required>
                                <div class="form-text">Min. 1 fő</div>
                            </div>
                            <div class="col-md-6">
                                <label for="bufferMinutes" class="form-label">Pufferidő (perc)</label>
                                <input type="number" class="form-control" id="bufferMinutes" name="bufferMinutes" th:value="${appointmentType.bufferMinutes}" min="0" max="60">
                                <div class="form-text">0–60 perc között</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label">Leírás</label>
                            <textarea class="form-control" id="description" name="description" th:text="${appointmentType.description}"></textarea>
                        </div>

                        <hr class="section-divider">
                        <div class="section-title">Beállítások</div>
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="requiresApproval" name="requiresApproval" th:checked="${appointmentType.requiresApproval}">
                                    <label class="form-check-label" for="requiresApproval" style="font-weight:500;">Jóváhagyást igényel</label>
                                </div>
                                <div class="form-text">Az időpontok manuális jóváhagyást igényelnek</div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="active" name="active" th:checked="${appointmentType.active}">
                                    <label class="form-check-label" for="active" style="font-weight:500;">Aktív</label>
                                </div>
                                <div class="form-text">Kikapcsolva a típus nem elérhető</div>
                            </div>
                        </div>

                        <div class="action-bar">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Mentés</button>
                            <a th:href="@{/admin/departments/{id}(id=${department.id})}" class="btn btn-outline-secondary">Mégse</a>
                        </div>
                    </form>

                    <!-- Danger zone -->
                    <div class="danger-zone">
                        <h6><i class="fas fa-exclamation-triangle me-1"></i>Veszélyes zóna</h6>
                        <p>Az időpont típus törlése nem vonható vissza.</p>
                        <form th:action="@{/admin/departments/{departmentId}/delete-appointment-type/{typeId}(departmentId=${department.id}, typeId=${appointmentType.id})}"
                              method="post"
                              onsubmit="return confirm('Biztosan törölni szeretné ezt a típust? A művelet nem vonható vissza.');">
                            <button type="submit" class="btn btn-danger btn-sm"><i class="fas fa-trash me-1"></i>Típus törlése</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
