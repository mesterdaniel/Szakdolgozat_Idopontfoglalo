<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'Szerkesztés: ' + ${department.name} + ' | Admin'">Részleg szerkesztése</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#0f1f3d;--navy-soft:#1a2f52;--teal:#00a896;--teal-light:#02c9b3;--teal-dim:rgba(0,168,150,.12);--red:#e84545;--bg:#f0f3f8;--surface:#fff;--surface-2:#f7f9fc;--border:#e2e8f0;--text-primary:#0f1f3d;--text-muted:#64748b;--shadow-sm:0 1px 4px rgba(15,31,61,.06);--shadow-md:0 4px 16px rgba(15,31,61,.10);--r-sm:6px;--r-xl:24px;--t:.25s cubic-bezier(.4,0,.2,1);}
        *,*::before,*::after{box-sizing:border-box;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);}
        .navbar-custom{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);padding:.75rem 0;}
        .navbar-custom .navbar-brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy)!important;}
        .navbar-custom .navbar-brand i{color:var(--teal);}
        .navbar-custom .nav-link{color:var(--text-muted)!important;font-weight:500;padding:.4rem .9rem!important;border-radius:var(--r-sm);transition:var(--t);}
        .navbar-custom .nav-link:hover{color:var(--navy)!important;background:var(--teal-dim);}
        .page-header{padding:2.5rem 0 1.5rem;}
        .page-header h1{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy);}
        .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xl);box-shadow:var(--shadow-md);padding:2rem;}
        .form-label{font-weight:500;color:var(--text-primary);font-size:.9rem;margin-bottom:.4rem;}
        .form-control{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text-primary);padding:.65rem 1rem;transition:var(--t);}
        .form-control:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,168,150,.15);background:var(--surface);color:var(--text-primary);}
        textarea.form-control{resize:vertical;min-height:100px;}
        .form-check-input:checked{background-color:var(--teal);border-color:var(--teal);}
        .btn{font-family:'DM Sans',sans-serif;font-weight:500;border-radius:var(--r-sm);transition:var(--t);}
        .btn-primary{background:var(--teal);border-color:var(--teal);color:white;}
        .btn-primary:hover{background:var(--teal-light);transform:translateY(-1px);color:white;}
        .btn-outline-secondary{border-color:var(--border);color:var(--text-muted);}
        .btn-outline-secondary:hover{background:var(--surface-2);color:var(--navy);}
        .alert{border-radius:10px;border:0;border-left:4px solid;padding:.9rem 1.1rem;}
        .alert-danger{background:#fef0f0;border-color:var(--red);color:#8b1a1a;}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand" href="/admin/dashboard"><i class="fas fa-calendar-check me-2"></i>Admin Panel</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/admin/departments">Részlegek</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="page-header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="mb-1"><i class="fas fa-edit me-2" style="color:var(--teal);font-size:1.3rem;"></i><span th:text="'Szerkesztés: ' + ${department.name}"></span></h1>
            <p class="text-muted mb-0" style="font-size:.9rem;">Részleg adatainak módosítása</p>
        </div>
        <a th:href="@{/admin/departments/{id}(id=${department.id})}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Vissza</a>
    </div>

    <div th:if="${error}" class="alert alert-danger mb-3" th:text="${error}"></div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="form-card">
                <form th:action="@{/admin/departments/{id}/update(id=${department.id})}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Részleg neve <span style="color:var(--red)">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" th:value="${department.name}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Leírás</label>
                        <textarea class="form-control" id="description" name="description" th:text="${department.description}"></textarea>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="active" name="active" th:checked="${department.active}">
                        <label class="form-check-label" for="active">Aktív részleg</label>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Mentés</button>
                        <a th:href="@{/admin/departments}" class="btn btn-outline-secondary">Mégse</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
