<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="'Admin - Időpont: ' + ${appointment.title}">Admin - Időpont részletei</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    :root {
        --navy:#0f1f3d;--navy-soft:#1a2f52;--teal:#00a896;--teal-light:#02c9b3;--teal-dim:rgba(0,168,150,.12);
        --amber:#f4a035;--red:#e84545;--green:#2ecc71;
        --bg:#f0f3f8;--surface:#fff;--surface-2:#f7f9fc;--border:#e2e8f0;
        --text-primary:#0f1f3d;--text-muted:#64748b;
        --shadow-sm:0 1px 4px rgba(15,31,61,.06);--shadow-md:0 4px 16px rgba(15,31,61,.10);
        --r-sm:6px;--r-md:10px;--r-lg:16px;--t:.25s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);}
    .navbar-custom{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);padding:.75rem 0;}
    .navbar-custom .navbar-brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy)!important;font-size:1.15rem;}
    .navbar-custom .navbar-brand i{color:var(--teal);}
    .navbar-custom .nav-link{color:var(--text-muted)!important;font-weight:500;padding:.4rem .9rem!important;border-radius:var(--r-sm);transition:var(--t);}
    .navbar-custom .nav-link:hover{color:var(--navy)!important;background:var(--teal-dim);}
    .navbar-custom .dropdown-menu{border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-md);padding:.5rem;}
    .navbar-custom .dropdown-item{border-radius:var(--r-sm);padding:.5rem .9rem;font-size:.9rem;transition:var(--t);}
    .navbar-custom .dropdown-item:hover{background:var(--teal-dim);color:var(--teal);}
    .hero-section{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-soft) 60%,#1e3a6e 100%);color:white;padding:2rem 2rem;margin-bottom:2.5rem;border-radius:var(--r-lg);position:relative;overflow:hidden;}
    .hero-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(0,168,150,.18) 0%,transparent 60%);pointer-events:none;}
    .hero-section h1{font-family:'Playfair Display',serif;font-weight:700;font-size:1.7rem;margin:0;}
    .feature-icon{width:48px;height:48px;background:rgba(0,168,150,.2);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--teal-light);font-size:1.2rem;}
    .breadcrumb{font-size:.8rem;}
    .breadcrumb-item+.breadcrumb-item::before{color:rgba(255,255,255,.5);}
    .breadcrumb-item a{color:rgba(255,255,255,.75);text-decoration:none;}
    .breadcrumb-item.active{color:rgba(255,255,255,.95);}
    .card-custom{border:1px solid var(--border)!important;border-radius:var(--r-lg)!important;box-shadow:var(--shadow-sm);background:var(--surface);margin-bottom:1.5rem;}
    .card-header-custom{background:var(--surface-2);border-bottom:1px solid var(--border);padding:1.1rem 1.5rem;}
    .status-badge{display:inline-block;padding:.35rem 1rem;border-radius:20px;font-size:.78rem;font-weight:600;letter-spacing:.03em;}
    .status-pending{background:#fef9ee;color:#9a6700;border:1px solid var(--amber);}
    .status-confirmed{background:#e8faf5;color:#1a6b45;border:1px solid var(--green);}
    .status-cancelled{background:#fef0f0;color:#8b1a1a;border:1px solid var(--red);}
    .status-completed{background:var(--surface-2);color:var(--text-muted);border:1px solid var(--border);}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:1.5rem;}
    .detail-item{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem 1.2rem;}
    .detail-item-icon{width:36px;height:36px;background:var(--teal-dim);border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--teal);font-size:.9rem;margin-bottom:.75rem;}
    .detail-item label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:.25rem;display:block;}
    .detail-item span{font-weight:600;color:var(--text-primary);font-size:.95rem;}
    .info-section{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:1.1rem 1.25rem;margin-bottom:1rem;}
    .info-section label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);display:block;margin-bottom:.35rem;}
    .btn{font-family:'DM Sans',sans-serif;font-weight:500;border-radius:var(--r-sm);transition:var(--t);}
    .btn-primary{background:var(--teal);border-color:var(--teal);color:white;}
    .btn-primary:hover{background:var(--teal-light);border-color:var(--teal-light);color:white;}
    .btn-success{background:var(--green);border-color:var(--green);color:white;}
    .btn-success:hover{background:#27ae60;border-color:#27ae60;transform:translateY(-1px);}
    .btn-danger{background:var(--red);border-color:var(--red);color:white;}
    .btn-danger:hover{background:#c0392b;border-color:#c0392b;transform:translateY(-1px);}
    .btn-warning{background:var(--amber);border-color:var(--amber);color:white;}
    .btn-warning:hover{filter:brightness(1.1);transform:translateY(-1px);}
    .btn-outline-light{border-color:rgba(255,255,255,.5);color:white;}
    .btn-outline-light:hover{background:rgba(255,255,255,.15);border-color:white;color:white;}
    .btn-outline-secondary{border-color:var(--border);color:var(--text-muted);}
    .btn-outline-secondary:hover{background:var(--surface-2);color:var(--navy);}
    .alert{border-radius:var(--r-md);border:0;border-left:4px solid;padding:.9rem 1.1rem;font-size:.9rem;}
    .alert-success{background:#e8faf5;border-color:var(--green);color:#1a6b45;}
    .alert-danger{background:#fef0f0;border-color:var(--red);color:#8b1a1a;}
    .alert-warning{background:#fef9ee;border-color:var(--amber);color:#92580a;}
    footer{border-top:1px solid var(--border);margin-top:3rem;padding:1.5rem 0;}
  </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container py-4">
  <!-- Hero -->
  <div class="hero-section">
    <div class="d-flex justify-content-between align-items-center position-relative">
      <div class="d-flex align-items-center gap-3">
        <div class="feature-icon"><i class="fas fa-calendar-check"></i></div>
        <div>
          <h1>Időpont részletei</h1>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0 mt-1">
              <li class="breadcrumb-item"><a href="/department-admin/dashboard">Admin</a></li>
              <li class="breadcrumb-item"><a href="/department-admin/appointments">Időpontok</a></li>
              <li class="breadcrumb-item active" aria-current="page">Részletek</li>
            </ol>
          </nav>
        </div>
      </div>
      <a href="/department-admin/appointments" class="btn btn-outline-light btn-sm">
        <i class="fas fa-arrow-left me-2"></i>Vissza
      </a>
    </div>
  </div>

  <!-- Alerts -->
  <div th:if="${success}" class="alert alert-success mb-3">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="alert alert-danger mb-3">
    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
  </div>
  <div th:if="${warning}" class="alert alert-warning mb-3">
    <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${warning}"></span>
  </div>

  <!-- Gyors műveletek -->
  <div class="card-custom">
    <div class="card-header-custom d-flex align-items-center gap-2">
      <i class="fas fa-bolt" style="color:var(--teal);"></i>
      <h6 class="mb-0 fw-bold">Gyors műveletek</h6>
    </div>
    <div class="card-body p-4">
      <div class="d-flex flex-wrap gap-2">
        <form th:if="${appointment.status.name() == 'PENDING'}"
              th:action="@{/department-admin/appointment/{id}/approve(id=${appointment.id})}" method="post" class="d-inline">
          <button type="submit" class="btn btn-success">
            <i class="fas fa-check me-2"></i>Jóváhagyás
          </button>
        </form>
        <form th:if="${appointment.status.active}"
              th:action="@{/department-admin/appointment/{id}/cancel(id=${appointment.id})}" method="post" class="d-inline">
          <button type="submit" class="btn btn-danger" onclick="return confirm('Biztosan lemondod ezt az időpontot?')">
            <i class="fas fa-times me-2"></i>Lemondás
          </button>
        </form>
        <form th:if="${appointment.status.name() == 'CONFIRMED'}"
              th:action="@{/department-admin/appointment/{id}/complete(id=${appointment.id})}" method="post" class="d-inline">
          <button type="submit" class="btn btn-warning">
            <i class="fas fa-flag-checkered me-2"></i>Befejezettnek jelölés
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-lg-8">
      <!-- Main card -->
      <div class="card-custom">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
              <h2 class="fw-bold mb-1" style="font-family:'Playfair Display',serif;font-size:1.4rem;" th:text="${appointment.title}">Időpont címe</h2>
              <p class="text-muted mb-0" style="font-size:.85rem;"><i class="far fa-calendar-alt me-1"></i>Időpont adatai</p>
            </div>
            <span class="status-badge" th:classappend="'status-' + ${appointment.status.name().toLowerCase()}" th:text="${appointment.status.name()}">ÁLLAPOT</span>
          </div>

          <!-- Detail grid -->
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-item-icon"><i class="fas fa-calendar"></i></div>
              <label>Dátum</label>
              <span th:text="${#temporals.format(appointment.appointmentDate, 'yyyy. MMMM dd.')}">2024. január 15.</span>
            </div>
            <div class="detail-item">
              <div class="detail-item-icon"><i class="far fa-clock"></i></div>
              <label>Időpont</label>
              <span th:text="${#temporals.format(appointment.appointmentDate, 'HH:mm')}">10:00</span>
            </div>
            <div class="detail-item">
              <div class="detail-item-icon"><i class="fas fa-hourglass-half"></i></div>
              <label>Időtartam</label>
              <span th:text="${appointment.durationMinutes + ' perc'}">60 perc</span>
            </div>
            <div class="detail-item">
              <div class="detail-item-icon"><i class="fas fa-flag-checkered"></i></div>
              <label>Befejezés</label>
              <span th:text="${#temporals.format(appointment.endTime, 'HH:mm')}">11:00</span>
            </div>
          </div>

          <!-- Description -->
          <div class="info-section">
            <label><i class="fas fa-info-circle me-1"></i>Leírás</label>
            <p class="mb-0" th:text="${appointment.description} ?: 'Nincs megadott leírás'" style="color:var(--text-primary);"></p>
          </div>

          <!-- Department -->
          <div class="info-section">
            <label><i class="fas fa-building me-1"></i>Részleg</label>
            <span class="fw-600" th:text="${appointment.department.name}" style="color:var(--text-primary);">Részleg neve</span>
          </div>
        </div>
      </div>

      <!-- User info -->
      <div class="card-custom">
        <div class="card-header-custom d-flex align-items-center gap-2">
          <i class="fas fa-user" style="color:var(--teal);"></i>
          <h6 class="mb-0 fw-bold">Felhasználó információk</h6>
        </div>
        <div class="card-body p-4">
          <div class="info-section mb-0">
            <label><i class="fas fa-id-card me-1"></i>Felhasználónév</label>
            <span class="fw-bold" th:text="${user.username}" style="color:var(--text-primary);font-size:1rem;">Felhasználó neve</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
