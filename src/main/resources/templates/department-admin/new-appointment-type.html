<!DOCTYPE html>
<html lang="hu" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Új Időpont Típus | Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    :root {
        --navy:#0f1f3d;--navy-soft:#1a2f52;--teal:#00a896;--teal-light:#02c9b3;--teal-dim:rgba(0,168,150,.12);
        --amber:#f4a035;--red:#e84545;--green:#2ecc71;
        --bg:#f0f3f8;--surface:#fff;--surface-2:#f7f9fc;--border:#e2e8f0;
        --text-primary:#0f1f3d;--text-muted:#64748b;
        --shadow-sm:0 1px 4px rgba(15,31,61,.06);--shadow-md:0 4px 16px rgba(15,31,61,.10);
        --r-sm:6px;--r-md:10px;--r-lg:16px;--t:.25s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);}
    .navbar-custom{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);padding:.75rem 0;}
    .navbar-custom .navbar-brand{font-family:'Playfair Display',serif;font-weight:700;color:var(--navy)!important;font-size:1.15rem;}
    .navbar-custom .navbar-brand i{color:var(--teal);}
    .hero-section{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-soft) 60%,#1e3a6e 100%);color:white;padding:2rem 2rem;margin-bottom:2.5rem;border-radius:var(--r-lg);position:relative;overflow:hidden;}
    .hero-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(0,168,150,.18) 0%,transparent 60%);pointer-events:none;}
    .hero-section h1{font-family:'Playfair Display',serif;font-weight:700;font-size:1.7rem;margin:0;}
    .feature-icon{width:48px;height:48px;background:rgba(0,168,150,.2);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;color:var(--teal-light);font-size:1.2rem;}
    .card-custom{border:1px solid var(--border)!important;border-radius:var(--r-lg)!important;box-shadow:var(--shadow-sm);background:var(--surface);margin-bottom:1.5rem;}
    .card-custom .card-header{background:var(--surface-2);border-bottom:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0!important;padding:1.1rem 1.5rem;}
    .section-header{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--teal);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
    .form-label{font-weight:600;font-size:.82rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.4rem;}
    .form-control,.form-select{border:1px solid var(--border);border-radius:var(--r-sm);padding:.65rem .9rem;font-family:'DM Sans',sans-serif;font-size:.9rem;transition:var(--t);}
    .form-control:focus,.form-select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(0,168,150,.15);outline:none;}
    .form-text{font-size:.78rem;color:var(--text-muted);margin-top:.3rem;}
    .form-check-input:checked{background-color:var(--teal);border-color:var(--teal);}
    .required-label::after{content:" *";color:var(--red);}
    .duration-btn{padding:.45rem 1rem;border:2px solid var(--border);background:var(--surface);border-radius:var(--r-sm);cursor:pointer;transition:var(--t);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:500;color:var(--text-muted);}
    .duration-btn:hover,.duration-btn.active{border-color:var(--teal);background:var(--teal);color:white;}
    .btn{font-family:'DM Sans',sans-serif;font-weight:500;border-radius:var(--r-sm);transition:var(--t);}
    .btn-primary{background:var(--teal);border-color:var(--teal);color:white;}
    .btn-primary:hover{background:var(--teal-light);border-color:var(--teal-light);color:white;transform:translateY(-1px);}
    .btn-outline-secondary{border-color:var(--border);color:var(--text-muted);}
    .btn-outline-secondary:hover{background:var(--surface-2);color:var(--navy);}
    .btn-outline-light{border-color:rgba(255,255,255,.5);color:white;}
    .btn-outline-light:hover{background:rgba(255,255,255,.15);border-color:white;color:white;}
    .alert{border-radius:var(--r-md);border:0;border-left:4px solid;padding:.9rem 1.1rem;font-size:.9rem;}
    .alert-success{background:#e8faf5;border-color:var(--green);color:#1a6b45;}
    .alert-danger{background:#fef0f0;border-color:var(--red);color:#8b1a1a;}
    footer{border-top:1px solid var(--border);margin-top:3rem;padding:1.5rem 0;}
  </style>
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>

<div class="container py-4" style="max-width:900px;">
  <!-- Hero -->
  <div class="hero-section">
    <div class="d-flex justify-content-between align-items-center position-relative">
      <div class="d-flex align-items-center gap-3">
        <div class="feature-icon"><i class="fas fa-plus-circle"></i></div>
        <div>
          <h1>Új Időpont Típus</h1>
          <p class="mb-0 opacity-75" style="font-size:.9rem;">Töltsd ki a mezőket a létrehozáshoz</p>
        </div>
      </div>
      <a th:href="@{/department-admin/departments/{id}(id=${department.id})}" class="btn btn-outline-light btn-sm">
        <i class="fas fa-arrow-left me-2"></i>Vissza
      </a>
    </div>
  </div>

  <!-- Alerts -->
  <div th:if="${success}" class="alert alert-success mb-3">
    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="alert alert-danger mb-3">
    <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
  </div>

  <div class="card-custom">
    <div class="card-header">
      <h6 class="mb-0 fw-bold"><i class="fas fa-calendar-alt me-2" style="color:var(--teal);"></i>Időpont típus adatai</h6>
    </div>
    <div class="card-body p-4">
      <form th:action="@{|/department-admin/${department.id}/create-appointment-type|}" method="post">
        <input type="hidden" name="departmentId" th:value="${departmentId}">

        <!-- Alapadatok -->
        <p class="section-header">Alapadatok</p>
        <div class="row mb-4">
          <div class="col-md-6 mb-3 mb-md-0">
            <label for="name" class="form-label required-label">Időpont típus neve</label>
            <input type="text" class="form-control" id="name" name="name" required
                   placeholder="Pl.: EKG vizsgálat" th:value="${appointmentType?.name}">
            <div class="form-text">Az időpont típus megjelenítendő neve</div>
          </div>
          <div class="col-md-6">
            <label for="description" class="form-label">Leírás</label>
            <textarea class="form-control" id="description" name="description" rows="3"
                      placeholder="Pl.: Szív elektrokardiográfia vizsgálat"
                      th:text="${appointmentType?.description}"></textarea>
          </div>
        </div>

        <!-- Időbeosztás -->
        <p class="section-header">Időbeosztás</p>
        <div class="row mb-4">
          <div class="col-md-6 mb-3 mb-md-0">
            <label for="defaultDurationMinutes" class="form-label required-label">Alapértelmezett időtartam (perc)</label>
            <input type="number" class="form-control" id="defaultDurationMinutes"
                   name="defaultDurationMinutes" min="5" max="480" required
                   th:value="${appointmentType?.defaultDurationMinutes ?: 25}">
            <div class="d-flex gap-2 mt-2 flex-wrap">
              <button type="button" class="duration-btn" onclick="setDuration(15)">15 perc</button>
              <button type="button" class="duration-btn active" onclick="setDuration(25)">25 perc</button>
              <button type="button" class="duration-btn" onclick="setDuration(30)">30 perc</button>
              <button type="button" class="duration-btn" onclick="setDuration(45)">45 perc</button>
              <button type="button" class="duration-btn" onclick="setDuration(60)">1 óra</button>
            </div>
            <div class="form-text">5–480 perc között</div>
          </div>
          <div class="col-md-6">
            <label for="bufferMinutes" class="form-label">Pufferidő (perc)</label>
            <input type="number" class="form-control" id="bufferMinutes"
                   name="bufferMinutes" min="0" max="120"
                   th:value="${appointmentType?.bufferMinutes ?: 5}">
            <div class="form-text">Két időpont között szünet (0–120 perc)</div>
          </div>
        </div>

        <!-- Részletek -->
        <p class="section-header">Részletek</p>
        <div class="row mb-4">
          <div class="col-md-6 mb-3 mb-md-0">
            <label for="maxParticipants" class="form-label required-label">Maximális résztvevők</label>
            <input type="number" class="form-control" id="maxParticipants"
                   name="maxParticipants" min="1" max="100" required
                   th:value="${appointmentType?.maxParticipants ?: 2}">
            <div class="form-text">Egyszerre hányan foglalhatnak</div>
          </div>
          <div class="col-md-6 d-flex align-items-center pt-3">
            <div>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="active" name="active" checked>
                <label class="form-check-label fw-600" for="active">Aktív</label>
              </div>
              <div class="form-text">Az időpont típus látható és foglalható-e</div>
            </div>
          </div>
        </div>

        <!-- Gombok -->
        <div class="d-flex gap-2 pt-3" style="border-top:1px solid var(--border);">
          <button type="submit" class="btn btn-primary">
            <i class="fas fa-save me-2"></i>Időpont típus mentése
          </button>
          <a th:href="@{/department-admin/departments/{id}(id=${department.id})}" class="btn btn-outline-secondary">
            <i class="fas fa-times me-1"></i>Mégse
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function setDuration(minutes) {
    document.getElementById('defaultDurationMinutes').value = minutes;
    document.querySelectorAll('.duration-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
  }
  document.querySelector('form').addEventListener('submit', function(e) {
    const name = document.getElementById('name').value.trim();
    const duration = parseInt(document.getElementById('defaultDurationMinutes').value);
    const participants = parseInt(document.getElementById('maxParticipants').value);
    if (!name) { alert('Az időpont típus neve kötelező!'); e.preventDefault(); return; }
    if (duration < 5 || duration > 480) { alert('Az időtartam 5 és 480 perc között kell legyen!'); e.preventDefault(); return; }
    if (participants < 1 || participants > 100) { alert('A résztvevők száma 1 és 100 között kell legyen!'); e.preventDefault(); return; }
    if (name.toLowerCase().includes('ekg') && duration < 20) {
      if (!confirm('Az EKG vizsgálathoz általában legalább 20 perc szükséges. Biztos?')) { e.preventDefault(); }
    }
  });
  document.getElementById('name').addEventListener('change', function() {
    if (this.value.toLowerCase().includes('ekg')) {
      if (!document.getElementById('description').value) document.getElementById('description').value = 'Szív elektrokardiográfia vizsgálat';
      if (document.getElementById('defaultDurationMinutes').value < 20) { document.getElementById('defaultDurationMinutes').value = 25; }
      if (document.getElementById('maxParticipants').value < 2) document.getElementById('maxParticipants').value = 2;
    }
  });
</script>
</body>
</html>
